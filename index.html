<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVO</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.sheet-container {
    width: 100%;
    height: 100vh;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* Mobile */
@media (max-width: 768px) {
    iframe {
        min-width: 1000px;
    }
}
</style>

</head>

<body>

<div class="sheet-container">
    <iframe
        src="https://docs.google.com/spreadsheets/d/1jTaBlyus3BPbsWIze0cUuE_1VKFuJYoi25dNVn0arzg/preview?gid=1188756480"
        frameborder="0">
    </iframe>
</div>

</body>
</html>
